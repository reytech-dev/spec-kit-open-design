schema_version: "1.0"

extension:
  id: "open-design"
  name: "Open Design"
  version: "1.1.1"
  description: "Normalizes Open Design assets into spec-kit-readable design context before specification generation."
  author: "Philipp Reinert"
  repository: "https://github.com/reytech-dev/spec-kit-open-design"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"
  commands:
    - "speckit.specify"

provides:
  commands:
    - name: "speckit.open-design.process"
      file: "commands/process.md"
      description: "Normalize Open Design assets into specification-ready artifacts."
    - name: "speckit.open-design.check"
      file: "commands/check.md"
      description: "Check whether normalized Open Design artifacts are missing or stale without writing files."
    - name: "speckit.open-design.draft"
      file: "commands/draft.md"
      description: "Process Open Design assets, then create design-aware specification draft input."

  config:
    - name: "open-design-config.yml"
      template: "open-design-config.template.yml"
      description: "Open Design processing configuration."
      required: false

hooks:
  before_specify:
    command: "speckit.open-design.process"
    optional: true
    description: "Normalize Open Design assets before specification generation."
    prompt: "Process Open Design assets before generating the specification?"

defaults:
  source:
    directories:
      - "designs/"
      - "open-design/"
      - ".od/artifacts/"
    include:
      - "**/*.html"
      - "**/*.htm"
      - "**/*.css"
      - "**/*.svg"
      - "**/*.json"
      - "**/*.md"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.webp"
      - "**/*.pdf"
      - "**/*.pptx"
      - "**/*.zip"
      - "**/*.mp4"
      - "**/*.mov"
      - "**/*.graphql"
      - "**/*.graphqls"
      - "**/openapi.*"
      - "**/*.proto"
      - "**/*.js"
      - "**/*.jsx"
    exclude:
      - "**/node_modules/**"
      - "**/.git/**"
      - "**/design-processing/**"
      - "**/visual-regression/**"
      - "**/handoff/**"
      - "**/.staging/**"
  output:
    directory: "designs/design-processing"
    history: true
    history_directory: "designs/design-processing/history"
    specify_context: "designs/design-processing/specify-context.md"
  project:
    slug: null
  visual:
    enabled: false
    directory: null
    screenshots_directory: null
    source_map: null
    route_map: null
    playwright:
      package_version: "1.50.0"
      runner: "workbench"
      browser: "chromium"
      headless: true
    render:
      wait_until: "networkidle"
      default_timeout_ms: 30000
      full_page: false
      animations: "disabled"
      caret: "hide"
      scale: "css"
    viewports:
      - name: desktop
        width: 1440
        height: 1024
        device_scale_factor: 1
      - name: tablet
        width: 768
        height: 1024
        device_scale_factor: 1
      - name: mobile
        width: 390
        height: 844
        device_scale_factor: 2
    diff:
      max_diff_pixels: 200
      max_diff_pixel_ratio: 0.001
      threshold: 0.2
    failure_policy:
      fail_on_render_error: false
      fail_on_missing_fonts: false
      fail_on_external_assets: false
  behavior:
    before_feature_exists: true
    stale_policy: "regenerate"
    preserve_history: true
    fail_on_no_assets: false
    fail_on_parse_warnings: false
  mcp:
    enabled: false
    server: "open-design"
    project: "current"
    artifact_strategy: "live-first"
    materialize_sources: true
    staging_directory: "designs/design-processing/.staging/open-design-mcp"
    fail_on_unavailable: false

tags:
  - "design"
  - "open-design"
  - "specification"
  - "tokens"
  - "ui"