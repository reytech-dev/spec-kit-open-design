# Open Design extension configuration
# Copy to: .specify/extensions/open-design/open-design-config.yml

source:
  # Directories are checked in order. Missing directories are ignored.
  directories:
    - designs/
    - open-design/
    - .od/artifacts/
    - workspace/design-context/${project.slug}/source/open-design-export

  include:
    - "**/*.html"
    - "**/*.htm"
    - "**/*.css"
    - "**/*.svg"
    - "**/*.json"
    - "**/*.md"
    - "**/*.png"
    - "**/*.jpg"
    - "**/*.jpeg"
    - "**/*.webp"
    - "**/*.pdf"
    - "**/*.pptx"
    - "**/*.zip"
    - "**/*.mp4"
    - "**/*.mov"
    - "**/*.graphql"
    - "**/*.graphqls"
    - "**/openapi.*"
    - "**/*.proto"

  exclude:
    - "**/node_modules/**"
    - "**/.git/**"
    - "**/design-processing/**"
    - "**/visual-regression/**"
    - "**/handoff/**"
    - "**/.staging/**"

output:
  # Global project context, intentionally not feature-scoped.
  directory: designs/design-processing
  history: true
  history_directory: designs/design-processing/history
  specify_context: designs/design-processing/specify-context.md

project:
  # Workbench-level project slug used to derive design-context paths.
  #
  # When set, defaults resolve to:
  #   workspace/design-context/<slug>/source/open-design-export
  #   workspace/design-context/<slug>/design-processing
  #   workspace/design-context/<slug>/visual-regression
  #   workspace/design-context/<slug>/handoff
  #
  # Set to null to disable project-scoped path inference.
  slug: null

behavior:
  # Allows design normalization before a spec-kit feature exists.
  before_feature_exists: true

  # One of: regenerate, warn, fail
  stale_policy: regenerate

  preserve_history: true
  fail_on_no_assets: false
  fail_on_parse_warnings: false

mcp:
  # Enables live, headless asset retrieval from the Open Design MCP server.
  #
  # Register the MCP server in the agent runtime, for example OpenCode's
  # opencode.jsonc:
  #
  # {
  #   "mcp": {
  #     "open-design": {
  #       "type": "local",
  #       "command": ["node", "/absolute/path/to/open-design/apps/daemon/dist/cli.js", "mcp"],
  #       "enabled": true
  #     }
  #   }
  # }
  #
  # This extension config controls how retrieved MCP assets are normalized into
  # spec-kit-readable project artifacts.
  enabled: false
  server: open-design
  project: current
  artifact_strategy: live-first
  materialize_sources: true
  staging_directory: designs/design-processing/.staging/open-design-mcp
  fail_on_unavailable: false

visual:
  # Enable rendered visual extraction and visual regression package generation.
  #
  # When enabled, the extension renders renderable Open Design sources at
  # configured viewports, captures canonical screenshots, extracts a DOM+style
  # tree into design-ir.json, and generates a self-contained visual regression
  # package that works before a frontend repository exists.
  enabled: false

  # Output directory for the visual regression package.
  # Defaults to workspace/design-context/<slug>/visual-regression when
  # project.slug is set, otherwise <output-directory>/../visual-regression.
  directory: null

  # Canonical screenshot storage directory.
  screenshots_directory: null

  # Paths for generated visual fixture files.
  source_map: null
  route_map: null

  playwright:
    # Playwright and @playwright/test npm package version.
    # Should match the workbench PLAYWRIGHT_VERSION major/minor.
    package_version: "1.50.0"

    # Runner identifier used for reporting.
    runner: "workbench"

    # Browser used for rendering and visual comparison.
    browser: "chromium"

    # Whether to run the browser in headless mode.
    headless: true

  render:
    # Page load wait strategy passed to page.goto waitUntil.
    wait_until: "networkidle"

    # Default timeout in milliseconds for page navigation and rendering.
    default_timeout_ms: 30000

    # Capture full scrollable page height when true.
    full_page: false

    # CSS animation strategy: "disabled" disables all animations.
    animations: "disabled"

    # Caret visibility: "hide" hides text cursor during capture.
    caret: "hide"

    # Device scale: "css" uses 1 CSS pixel = 1 device pixel.
    scale: "css"

  viewports:
    - name: desktop
      width: 1440
      height: 1024
      device_scale_factor: 1
    - name: tablet
      width: 768
      height: 1024
      device_scale_factor: 1
    - name: mobile
      width: 390
      height: 844
      device_scale_factor: 2

  diff:
    # Maximum absolute pixel difference allowed per screenshot.
    max_diff_pixels: 200

    # Maximum pixel difference ratio allowed per screenshot.
    max_diff_pixel_ratio: 0.001

    # Pixelmatch comparison threshold (0-1).
    threshold: 0.2

  failure_policy:
    # Fail the processing command when a render error occurs.
    fail_on_render_error: false

    # Emit a warning when fonts are not loaded during capture.
    fail_on_missing_fonts: false

    # Emit a warning when external assets (CDN, third-party) fail to load.
    fail_on_external_assets: false