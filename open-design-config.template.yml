# Open Design extension configuration
# Copy to: .specify/extensions/open-design/open-design-config.yml

source:
  # Directories are checked in order. Missing directories are ignored.
  directories:
    - designs/
    - open-design/
    - .od/artifacts/
    - workspace/design-context/${project.slug}/source/open-design-export

  include:
    - "**/*.html"
    - "**/*.htm"
    - "**/*.css"
    - "**/*.svg"
    - "**/*.json"
    - "**/*.md"
    - "**/*.png"
    - "**/*.jpg"
    - "**/*.jpeg"
    - "**/*.webp"
    - "**/*.pdf"
    - "**/*.pptx"
    - "**/*.zip"
    - "**/*.mp4"
    - "**/*.mov"
    - "**/*.graphql"
    - "**/*.graphqls"
    - "**/openapi.*"
    - "**/*.proto"

  exclude:
    - "**/node_modules/**"
    - "**/.git/**"
    - "**/design-processing/**"
    - "**/visual-regression/**"
    - "**/handoff/**"
    - "**/.staging/**"

output:
  # Global project context, intentionally not feature-scoped.
  directory: designs/design-processing
  history: true
  history_directory: designs/design-processing/history
  specify_context: designs/design-processing/specify-context.md

project:
  # Workbench-level project slug used to derive design-context paths.
  #
  # When set, defaults resolve to:
  #   workspace/design-context/<slug>/source/open-design-export
  #   workspace/design-context/<slug>/design-processing
  #   workspace/design-context/<slug>/visual-regression
  #   workspace/design-context/<slug>/handoff
  #
  # Set to null to disable project-scoped path inference.
  slug: null

behavior:
  # Allows design normalization before a spec-kit feature exists.
  before_feature_exists: true

  # One of: regenerate, warn, fail
  stale_policy: regenerate

  preserve_history: true
  fail_on_no_assets: false
  fail_on_parse_warnings: false

mcp:
  # Enables live, headless asset retrieval from the Open Design MCP server.
  #
  # Register the MCP server in the agent runtime, for example OpenCode's
  # opencode.jsonc:
  #
  # {
  #   "mcp": {
  #     "open-design": {
  #       "type": "local",
  #       "command": ["node", "/absolute/path/to/open-design/apps/daemon/dist/cli.js", "mcp"],
  #       "enabled": true
  #     }
  #   }
  # }
  #
  # This extension config controls how retrieved MCP assets are normalized into
  # spec-kit-readable project artifacts.
  enabled: false
  server: open-design
  project: current
  artifact_strategy: live-first
  materialize_sources: true
  staging_directory: designs/design-processing/.staging/open-design-mcp
  fail_on_unavailable: false

visual:
  # Ingest artifacts produced by opencode-environment's static crawler.
  # The extension does not run Playwright and does not generate crawler code.
  enabled: true

  # If true, processing fails when visual artifacts are missing or invalid.
  # If false, processing continues with warnings.
  required: false

  # Canonical URL used by the workbench design-preview service.
  canonical_url_template: "http://design-preview:80/design-context/${project.slug}/index.html"

  artifacts:
    design_ir: null
    prototype_map: null
    source_map: null
    screenshots_directory: null

  comparison:
    # Route map is generated by spec-kit-open-design as an editable mapping
    # from design screens to future frontend routes.
    route_map: null
    default_frontend_url: "http://node-runner:5173"
    generate_route_map_template: true

    diff:
      max_diff_pixels: 200
      max_diff_pixel_ratio: 0.001
      threshold: 0.2

  failure_policy:
    fail_on_missing_visual_artifacts: false
    fail_on_invalid_visual_artifacts: false
    fail_on_missing_screenshots: false